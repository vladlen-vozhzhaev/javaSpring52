<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Добавить бронирование</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>

<div class="container">
    <h1 class="text-center my-5">Добавить бронирование</h1>
    <form th:action="@{/add-booking}" th:object="${booking}" method="post">
        <div class="mb-3">
            <label for="clientId">Выберите клиента</label>
            <select name="clientId" id="clientId">
                <option value="">Выберите клиента</option>
                <option th:each="client : ${clients}" th:value="${client.id}" th:text="${client.fullName}"></option>
            </select>
        </div>
        <div class="mb-3">
            <label for="roomId">Выберите комнату</label>
            <select name="roomId" id="roomId">
                <option value="">Выберите комнату</option>
                <option th:each="room : ${rooms}" th:value="${room.id}" th:text="${room.roomNumber}"></option>
            </select>
        </div>
        <div class="mb-3">
            <label for="phone">Дата заезда</label>
            <input type="date" class="form-control" th:field="*{checkInDate}" placeholder="Номер телефона" id="phone">
        </div>
        <div class="mb-3">
            <label for="phone">Дата выезда</label>
            <input type="date" class="form-control" th:field="*{checkOutDate}" placeholder="Номер телефона" id="phone">
        </div>
        <div class="mb-3">
            <label for="email">Кол-во гостей</label>
            <input type="text" class="form-control" th:field="*{guestsCount}" placeholder="Электронная почта" id="email">
        </div>
        <div class="mb-3">
            <input type="submit" class="form-control btn btn-primary" value="Добавить">
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
