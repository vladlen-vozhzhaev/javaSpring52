<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div class="container">
    <h1 class="text-center my-5">Список комнат</h1>
    <table class="table">
        <thead>
        <tr class="table-info">
            <th scope="col">Номер комнаты</th>
            <th scope="col">Тип комнаты</th>
            <th scope="col">Статус</th>
            <th scope="col">Цена</th>
            <th scope="col">Действие</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="room: ${roomList}">
            <th scope="row" th:text="${room.roomNumber}"></th>
            <td th:text="${room.type}"></td>
            <td th:text="${room.status}"></td>
            <td th:text="${room.pricePerNight}"></td>
            <td>
                <a th:href="@{/delete/{id}(id=${room.getId()})}">Удалить</a>
                <a th:href="@{/edit/{id}(id=${room.getId()})}">Редактировать</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
